<!DOCTYPE html>
<html lang="en">

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="./style.css">

    <title>Frontend Mentor Practice QR code page</title>
</head>

<main>

  <content id="qr-body">
